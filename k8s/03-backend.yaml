apiVersion: apps/v1
kind: Deployment
metadata:
  name: studytrack-backend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: studytrack-backend
  template:
    metadata:
      labels:
        app: studytrack-backend
    spec:
      containers:
      - name: backend
        image: fersc/studytrack-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
        envFrom:
        - configMapRef:
            name: studytrack-config
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: studytrack-secrets
              key: DATABASE_URL
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  type: ClusterIP
  selector:
    app: studytrack-backend
  ports:
  - protocol: TCP
    port: 3000
    targetPort: 3000