<div class="login-container" style="max-width: 400px; margin: 50px auto; font-family: sans-serif;">
  <h2>Ingresar a StudyTrack</h2>

  @if (errorMessage) {
    <div style="background-color: #ffebee; color: #c62828; padding: 10px; border-radius: 4px; margin-bottom: 15px;">
      ⚠️ {{ errorMessage }}
    </div>
  }

  <div style="display: flex; flex-direction: column; gap: 15px;">
<div>
      <label for="emailInput">Email</label><br>
      <input id="emailInput" type="email" [(ngModel)]="email" placeholder="correo@dominio.com" style="width: 100%; padding: 8px;">
    </div>

    <div>
      <label for="passwordInput">Contraseña</label><br>
      <input id="passwordInput" type="password" [(ngModel)]="password" placeholder="********" style="width: 100%; padding: 8px;">
    </div>

    <button 
      (click)="onLogin()" 
      [disabled]="isLoading"
      style="padding: 10px; background-color: #5991cd; color: white; border: none; border-radius: 4px; cursor: pointer;">
      @if (isLoading) {
        Iniciando sesion.
      } @else {
        Iniciar Sesión
      }
    </button>
  </div>
</div>
