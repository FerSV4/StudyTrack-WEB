name: Frontend CI/CD Pipeline

on:
  push:
    branches: [ "main", "master", "Examen1-MVP" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  validate:
    name: Frontend Validation (Angular)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Generate Environment Files
        run: |
          mkdir -p src/environments
          echo "export const environment = { production: true, apiUrl: '${{ secrets.API_URL_PROD }}' };" > src/environments/environment.ts
          echo "export const environment = { production: true, apiUrl: '${{ secrets.API_URL_PROD }}' };" > src/environments/environment.prod.ts

      - name: Build Angular
        run: npm run build -- --configuration production

  docker-build-and-push:
    name: Dockerize & Push Frontend
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Generate Environment Files for Docker
        run: |
          mkdir -p src/environments
          echo "export const environment = { production: true, apiUrl: '${{ secrets.API_URL_PROD }}' };" > src/environments/environment.ts
          echo "export const environment = { production: true, apiUrl: '${{ secrets.API_URL_PROD }}' };" > src/environments/environment.prod.ts

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Frontend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/studytrack-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max